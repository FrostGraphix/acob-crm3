services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - redis
    environment:
      PORT: 3000
      NODE_ENV: production
      UPSTREAM_API_URL: "${UPSTREAM_API_URL:?set UPSTREAM_API_URL in your .env file}"
      UPSTREAM_USERNAME: "${UPSTREAM_USERNAME:?set UPSTREAM_USERNAME in your .env file}"
      UPSTREAM_PASSWORD: "${UPSTREAM_PASSWORD:?set UPSTREAM_PASSWORD in your .env file}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in your .env file}"
      SESSION_STORE_MODE: "redis"
      REDIS_URL: "redis://redis:6379"
      REDIS_KEY_PREFIX: "acob:session:"
      STRICT_DEPENDENCY_STARTUP: "true"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  redis-data:
